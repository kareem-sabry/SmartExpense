name: CI

on:
  push:
    branches: [ master, 'fix/**', 'feat/**', 'refactor/**', 'docs/**' ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore SmartExpense.sln

      - name: Build
        run: dotnet build SmartExpense.sln --no-restore -c Release

      - name: Run tests
        run: >
          dotnet test SmartExpense.sln
          --no-build
          -c Release
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/test-results.trx'

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: '**/coverage.cobertura.xml'