services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartexpense-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=SmartExpense;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=true;MultipleActiveResultSets=true
      - JwtOptions__Secret=${JWT_SECRET}
      - JwtOptions__Issuer=SmartExpenseApi
      - JwtOptions__Audience=SmartExpenseClient
      - AdminUser__Email=${ADMIN_EMAIL}
      - AdminUser__Password=${ADMIN_PASSWORD}
      - AdminUser__FirstName=Admin
      - AdminUser__LastName=User
      - Serilog__WriteTo__1__Name=Seq
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:80
    depends_on:
      db:
        condition: service_healthy
      seq:
        condition: service_started
    restart: unless-stopped

  seq:
    image: datalust/seq:latest
    container_name: smartexpense-seq
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "5341:80"   # log ingestion (matches appsettings.Development.json)
      - "8081:80"   # web UI → http://localhost:8081
    volumes:
      - seqdata:/data
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: smartexpense-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${DB_PASSWORD} -Q 'SELECT 1' -C || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  sqldata:
  seqdata:            